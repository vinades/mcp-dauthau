name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24", "26"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      # Windows CI khó build bcrypt native (node-gyp + Python). Skip bcrypt test ở Windows.
      SKIP_BCRYPT_TESTS: ${{ matrix.os == 'windows-latest' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling repo (shared assets)
        run: git clone --depth=1 https://github.com/dauthau/dauthau-mcp-service.git ../dauthau-mcp-service
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm audit --audit-level=high
